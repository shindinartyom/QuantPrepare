<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantPrepare - {% block title %}Платформа для подготовки{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'problems:index' %}">📊 QuantPrepare</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'problems:index' %}">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'problems:problem_list' %}">Задачи</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'problems:problem_create' %}">Добавить</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'problems:statistics' %}">Статистика</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
